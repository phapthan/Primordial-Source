<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primordial Source | Apps & Translations</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #2d3436;
            --accent-color: #0984e3; /* Bleu ciel profond */
            --secondary-color: #636e72;
            --light-blue: #e1f5fe;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, var(--bg-color) 0%, var(--light-blue) 100%);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .mandala-container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.3);
        }

        h1 {
            font-weight: 200;
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            text-transform: uppercase;
        }

        .subtitle {
            font-style: italic;
            color: var(--secondary-color);
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            padding: 20px;
            border: 1px solid #dfe6e9;
            border-radius: 15px;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s ease;
            background: white;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 20px rgba(9, 132, 227, 0.1);
        }

        .card h2 {
            font-size: 1.1rem;
            margin: 0 0 10px 0;
            color: var(--accent-color);
            font-weight: 400;
        }

        .card p {
            font-size: 0.85rem;
            margin: 0;
            color: var(--secondary-color);
            line-height: 1.4;
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #b2bec3;
            text-transform: uppercase;
        }

        /* Animation subtile de respiration */
        @keyframes breathe {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .source-dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-color);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: breathe 4s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div class="mandala-container">
        <div class="source-dot"></div>
        <h1>Primordial Source</h1>
        <p class="subtitle">Espace de manifestation pour la présence éveillée</p>

        <div class="grid">
            <a href="https://phapthan.github.io/21_Semdzins/" class="card">
                <h2>Applications</h2>
                <p>Outils interactifs, Semdzins et supports de méditation.</p>
            </a>
            <a href="#" class="card">
                <h2>Traductions</h2>
                <p>Textes sacrés et enseignements de la Grande Perfection.</p>
            </a>
        </div>

        <div class="footer">
            Rigpa • Kadag • Salwa
        </div>
    </div>

</body>
</html>
